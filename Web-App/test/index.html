<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下一個質數查找器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.5rem;
      width: min(420px, 90vw);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 0.4rem;
    }

    p.subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 1.8rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }

    button {
      margin-top: 1.2rem;
      width: 100%;
      padding: 0.8rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background: #4f46e5; }
    button:active { transform: scale(0.98); }

    .result {
      margin-top: 1.6rem;
      padding: 1.2rem;
      border-radius: 10px;
      text-align: center;
      display: none;
    }

    .result.success {
      background: #0d2d1e;
      border: 1px solid #16a34a;
      display: block;
    }

    .result.error {
      background: #2d0d0d;
      border: 1px solid #dc2626;
      display: block;
    }

    .result .label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result .prime {
      font-size: 2.4rem;
      font-weight: 800;
      color: #4ade80;
      line-height: 1.1;
    }

    .result .info {
      font-size: 0.82rem;
      color: #64748b;
      margin-top: 0.5rem;
    }

    .result .error-msg {
      color: #f87171;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>下一個質數查找器</h1>
    <p class="subtitle">輸入一個正整數，找出比它大且最接近的質數</p>

    <label for="numInput">輸入正整數</label>
    <input type="text" id="numInput" placeholder="例如：100" autocomplete="off" />

    <button onclick="findNextPrime()">查找質數</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    document.getElementById('numInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') findNextPrime();
    });

    function isPrime(n) {
      if (n < 2) return false;
      if (n === 2) return true;
      if (n % 2 === 0) return false;
      for (let i = 3; i * i <= n; i += 2) {
        if (n % i === 0) return false;
      }
      return true;
    }

    function findNextPrime() {
      const raw = document.getElementById('numInput').value.trim();
      const resultEl = document.getElementById('result');

      const n = Number(raw);

      if (!raw || !Number.isInteger(n) || n < 1 || n > 1e15) {
        resultEl.className = 'result error';
        resultEl.innerHTML = '<span class="error-msg">請輸入有效的正整數（1 ~ 10¹⁵）</span>';
        return;
      }

      // 從 n+1 往上找第一個質數
      let candidate = Math.floor(n) + 1;
      while (!isPrime(candidate)) {
        candidate++;
      }

      const diff = candidate - n;
      resultEl.className = 'result success';
      resultEl.innerHTML = `
        <div class="label">比 ${n.toLocaleString()} 大的最近質數</div>
        <div class="prime">${candidate.toLocaleString()}</div>
        <div class="info">差距：${diff.toLocaleString()} 個數</div>
      `;
    }
  </script>
</body>
</html>
