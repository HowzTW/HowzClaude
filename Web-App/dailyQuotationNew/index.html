<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>箴言小幫手</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <!-- Google Fonts & Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Montserrat:wght@300;400;700&display=swap">
    <link rel="stylesheet" href="style.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <div class="logo">
                    <img src="icon.png" alt="Logo">
                    <span>箴言小幫手A</span>
                </div>
                <button class="btn-reset-top" onclick="resetWizard()" title="重來"><span
                        class="material-symbols-rounded">refresh</span></button>
            </div>
            <div class="progress-bar">
                <div class="step-indicator" id="step_indicator">步驟 1 / 5</div>
                <div class="progress-line">
                    <div id="progress_fill" class="progress-fill"></div>
                </div>
            </div>
        </header>

        <main id="wizard_steps">
            <!-- Step 1: Select Date -->
            <section id="step_1" class="step-section active">

                <h2>第 1 步：選擇日期</h2>
                <div class="date-nav-group">
                    <button class="btn-date-nav" onclick="changeDate(-1)" title="前一日"><span
                            class="material-symbols-rounded">chevron_left</span></button>
                    <div class="date-input-wrapper">
                        <input type="date" id="date_input" onchange="updateUI()">
                    </div>
                    <button class="btn-date-nav" onclick="changeDate(1)" title="後一日"><span
                            class="material-symbols-rounded">chevron_right</span></button>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="nextStep()">下一步 <span
                            class="material-symbols-rounded">arrow_forward</span></button>
                </div>
            </section>

            <!-- Step 2: Edit Content -->
            <section id="step_2" class="step-section">

                <h2>第 2 步：編輯箴言內容</h2>
                <div class="input-group">
                    <label for="content_input">箴言內容：</label>
                    <textarea id="content_input" rows="6" placeholder="正在讀取資料..."></textarea>
                </div>
                <div id="data_info" class="data-info">
                    <p><strong>來源：</strong> <span id="source_display"></span></p>
                    <p><strong>背景建議：</strong> <span id="bg_display"></span></p>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="prevStep()"><span
                            class="material-symbols-rounded">arrow_back</span> 上一步</button>
                    <button class="btn btn-primary" onclick="nextStep()">下一步 <span
                            class="material-symbols-rounded">arrow_forward</span></button>
                </div>
            </section>

            <!-- Step 3: AI Prompt -->
            <section id="step_3" class="step-section">

                <h2>第 3 步：生成 AI 提示詞</h2>
                <div class="input-group">
                    <label for="prompt_input">複製提示詞至 ChatGPT 產生圖片：</label>
                    <textarea id="prompt_input" rows="8"></textarea>
                </div>
                <div class="actions" style="margin-bottom: 20px;">
                    <a id="chatgpt_link" class="btn btn-accent" href="#" target="_blank"
                        onclick="copyAndPrepareChatGPT(event)" style="width: 100%;">
                        <span class="material-symbols-rounded">forum</span> 送給 ChatGPT
                    </a>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="prevStep()"><span
                            class="material-symbols-rounded">arrow_back</span> 上一步</button>
                    <button class="btn btn-primary" onclick="nextStep()">下一步 <span
                            class="material-symbols-rounded">arrow_forward</span></button>
                </div>
            </section>

            <!-- Step 4: Upload Image -->
            <section id="step_4" class="step-section">

                <h2>第 4 步：上傳背景圖片</h2>
                <div class="upload-container" id="drop_zone" onclick="triggerFileInput()">
                    <span class="material-symbols-rounded">cloud_upload</span>
                    <p>點擊或拖放圖片至此</p>
                    <input type="file" id="file_input" accept="image/*" style="display: none;"
                        onchange="handleFileUpload(event)">
                </div>
                <div id="upload_preview" class="preview-box">
                    <img id="preview_img" src="" alt="Preview" style="display: none;">
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="prevStep()"><span
                            class="material-symbols-rounded">arrow_back</span> 上一步</button>
                    <button class="btn btn-primary" id="btn_step4_next" onclick="nextStep()" disabled>下一步 <span
                            class="material-symbols-rounded">arrow_forward</span></button>
                </div>
            </section>

            <!-- Step 5: Final Preview & Download -->
            <section id="step_5" class="step-section">

                <h2>第 5 步：預覽與下載</h2>
                <div class="card-scroll-wrapper">
                    <div class="card-viewer">
                        <!-- The actual card (Responsive like original) -->
                        <div id="poster_card" class="poster-card">
                            <div class="card-title">每日箴言</div>
                            <div id="card_date" class="date-label"></div>
                            <div id="card_quote_container" class="quote-content">
                                <div id="card_quote_inner"></div>
                            </div>
                            <div style="width: 100%; text-align: right;">
                                <div class="quote-author">——池田大作</div>
                                <div id="card_source" class="quote-source"></div>
                            </div>
                            <div id="card_landmark" class="landmark-badge" style="display:none;">
                                <span class="material-symbols-rounded">location_on</span>
                                <span id="card_location"></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-secondary" onclick="prevStep()"><span
                            class="material-symbols-rounded">arrow_back</span> 上一步</button>
                    <button class="btn btn-success" onclick="downloadPoster()">
                        <span class="material-symbols-rounded">download</span> 下載
                    </button>
                </div>
            </section>
        </main>

        <footer>
            <span>© 2026 Daily Quotation Project | 最後修改時間：<span id="last_mod">-</span></span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
